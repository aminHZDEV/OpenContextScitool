name: CI

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -e '.[server]' pytest
      # Run from tests/ so a stray okf_ctx.egg-info in the repo root can't make
      # pip/pytest resolve the wrong thing (the console-scripts footgun).
      - run: python -m pytest tests/ -q

  publish:
    # Only on a version tag, and only after tests pass. 0.1.0 was uploaded by
    # hand; this fires for 0.1.1 onward. A PyPI version is permanent, so a
    # failed test here stops a bad release before it becomes unfixable.
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC — no API token stored anywhere
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
